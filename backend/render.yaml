services:
  - type: web
    name: synapse-backend
    env: python
    region: oregon
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: INSFORGE_URL
        sync: false
      - key: INSFORGE_ANON_KEY
        sync: false
      - key: INSFORGE_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://your-frontend.vercel.app
